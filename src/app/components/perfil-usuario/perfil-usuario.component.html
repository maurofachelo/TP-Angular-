<div class="perfil-container">
  <h2 class="perfil-titulo">Perfil de Usuario</h2>

  <div class="perfil-avatar">
    <div class="perfil-avatar-circle">
      <!-- Mostrar iniciales del nombre -->
      {{ nombre.charAt(0).toUpperCase() || "?" }}
    </div>
  </div>

  <div class="perfil-info">
    <div class="perfil-item">
      <span class="perfil-item-label">📋 Nombre completo</span>
      <span class="perfil-item-value">
        {{ nombre || "No disponible" }}
      </span>
    </div>

    <div class="perfil-item">
      <span class="perfil-item-label">✉️ Correo electrónico</span>
      <span class="perfil-item-value">
        {{ correo || "No disponible" }}
      </span>
    </div>
  </div>
</div>
